<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Игровой портал</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e14;
      background-image: radial-gradient(circle at 20% 30%, #1a2a3a, #05080a);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      color: #e8e8e8;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app { max-width: 1100px; width: 100%; }
    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #1a2a3a;
      padding-bottom: 10px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f5c542, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .header .sub { color: #8899aa; font-size: 0.9rem; }
    .card {
      background: #101820;
      border: 1px solid #1a2a3a;
      border-radius: 16px;
      padding: 20px;
      margin: 12px 0;
    }
    .card h2 { color: #f5c542; font-weight: 400; margin-bottom: 10px; font-size: 1.2rem; }
    .input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .input-group input, .input-group select {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      color: #e8e8e8;
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 1rem;
      flex: 1;
      min-width: 120px;
      outline: none;
    }
    .input-group input:focus { border-color: #f5c542; }
    .btn {
      background: #f5c542;
      border: none;
      color: #0a0e14;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.15s;
      font-size: 1rem;
    }
    .btn:active { transform: scale(0.94); }
    .btn-secondary { background: #1a2a3a; color: #c0d0e0; }
    .btn-secondary:hover { background: #2a3a4a; }
    .btn-success { background: #1a5a2a; color: #7aff7a; }
    .btn-danger { background: #6a1a1a; color: #ff8888; }
    .btn-outline { background: transparent; border: 1px solid #f5c542; color: #f5c542; }
    .btn-outline:hover { background: #f5c54222; }
    .btn-small { font-size: 0.8rem; padding: 6px 16px; }
    .hidden { display: none !important; }

    .game-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .game-btn {
      background: #141c24;
      border: 1px solid #2a3a4a;
      color: #c0d0e0;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .game-btn:hover { border-color: #f5c542; box-shadow: 0 0 30px #f5c54222; }
    .game-btn.active { background: #f5c542; color: #0a0e14; border-color: #f5c542; }

    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin: 12px 0;
    }
    .card-item {
      background: #141c24;
      border-left: 6px solid #f5c542;
      border-radius: 14px;
      padding: 14px 18px;
      flex: 1 1 180px;
      max-width: 230px;
      min-width: 150px;
      text-align: center;
      box-shadow: 0 8px 30px #00000099;
      cursor: pointer;
      transition: 0.2s;
    }
    .card-item:hover { transform: translateY(-4px); border-color: #ffa500; }
    .card-item .card-title { font-size: 0.6rem; text-transform: uppercase; color: #f5c542; }
    .card-item .card-value { font-size: 1.1rem; font-weight: 600; color: #f0f0f0; }
    .card-item .card-desc { font-size: 0.7rem; color: #8899aa; margin-top: 4px; font-style: italic; }

    .info-panels {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 10px 0;
    }
    .info-panel {
      background: #101820;
      border: 1px solid #1a2a3a;
      border-radius: 16px;
      padding: 12px 18px;
      flex: 1;
      min-width: 200px;
    }
    .info-panel h4 { color: #f5c542; font-weight: 400; margin-bottom: 6px; }
    .info-chip {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      border-radius: 30px;
      padding: 4px 14px;
      display: inline-block;
      margin: 3px;
      font-size: 0.85rem;
    }
    .info-chip .label { color: #f5c542; font-weight: 600; }
    .info-empty {
      color: #556;
      font-style: italic;
      font-size: 0.85rem;
    }

    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }
    .player-chip {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.9rem;
    }
    .player-chip.host { border-color: #f5c542; background: #1a2a2a; }

    .log {
      background: #0a141c;
      border-radius: 12px;
      padding: 12px 16px;
      max-height: 200px;
      overflow-y: auto;
      margin: 10px 0;
      font-size: 0.9rem;
      color: #aab;
      border: 1px solid #1a2a3a;
    }
    .log .entry { padding: 4px 0; border-bottom: 1px solid #0a141c; }

    .role-reveal {
      background: #1a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      margin: 10px 0;
      text-align: center;
      font-size: 1.2rem;
    }
    .role-reveal .role { color: #f5c542; font-weight: 700; }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .game-btn { font-size: 0.8rem; padding: 8px 16px; }
      .card-item { flex: 1 1 100%; max-width: 100%; }
      .info-panel { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🎮 Игровой портал</h1>
    <div class="sub">Бункер · Мафия · Шпион</div>
  </div>

  <!-- ВЫБОР ИГРЫ -->
  <div class="game-selector">
    <button class="game-btn active" data-game="bunker">🏚️ Бункер</button>
    <button class="game-btn" data-game="mafia">🔪 Мафия</button>
    <button class="game-btn" data-game="spy">🕵️ Шпион</button>
  </div>

  <!-- БУНКЕР -->
  <div id="bunkerSection">
    <div class="card">
      <h2>🏚️ Бункер</h2>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <button class="btn" id="bunkerStartBtn">▶ Начать</button>
        <button class="btn btn-secondary" id="bunkerRestartBtn">⟳ Заново</button>
        <button class="btn btn-outline" id="bunkerCatastropheBtn">🌪️ Эпидемия</button>
        <button class="btn btn-outline" id="bunkerContentsBtn">📦 Бункер</button>
        <button class="btn btn-outline" id="truthOrDareBtn">🎲 Правда или Действие</button>
      </div>

      <!-- Результат Правда/Действие -->
      <div id="truthOrDareResult" style="margin-top:10px; padding:12px 16px; background:#1a2a2a; border-radius:12px; font-size:1.1rem; display:none; align-items:center; flex-wrap:wrap; gap:10px;">
        <span id="truthOrDareMessage"></span>
        <button class="btn btn-secondary btn-small" id="helpBtn">🤝 Помощь зала</button>
      </div>

      <div class="info-panels">
        <div class="info-panel" id="catastrophePanel">
          <h4>🌪️ Катастрофа / Эпидемия</h4>
          <div id="catastropheContent"><span class="info-empty">Не выбрана</span></div>
        </div>
        <div class="info-panel" id="bunkerPanel">
          <h4>📦 Содержимое бункера</h4>
          <div id="bunkerContent"><span class="info-empty">Не загружено</span></div>
        </div>
      </div>

      <div class="cards-grid" id="bunkerCards"></div>
    </div>
  </div>

  <!-- ОНЛАЙН -->
  <div id="onlineSection" class="hidden">
    <div id="lobbyScreen" class="card">
      <h2>🏠 Вход в игру</h2>
      <div class="input-group" style="margin-bottom:10px;">
        <input type="text" id="playerNameInput" placeholder="Ваш ник" value="Игрок">
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="createRoomBtn">➕ Создать комнату</button>
        <div style="display:flex; gap:6px; flex:1; min-width:200px;">
          <input type="text" id="roomCodeInput" placeholder="Код комнаты" style="flex:1; background:#0a141c; border:1px solid #1a2a3a; color:#e8e8e8; padding:10px 16px; border-radius:30px; font-size:1rem; outline:none;">
          <button class="btn btn-secondary" id="joinRoomBtn">🔗 Войти</button>
        </div>
      </div>
      <div id="onlineError" style="color:#ff6666; margin-top:8px;"></div>
    </div>

    <div id="roomScreen" class="card hidden">
      <h2>📦 Комната: <span id="roomCodeDisplay">---</span></h2>
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
        <span id="onlineGameType" style="color:#aab;">Игра: Мафия</span>
        <span id="playersCountDisplay" style="color:#aab;">Игроков: 0</span>
      </div>
      <div class="player-list" id="playerList"></div>
      <button class="btn btn-success" id="startGameBtn">🚀 Начать игру</button>
      <button class="btn btn-secondary" id="leaveRoomBtn">🚪 Выйти</button>
    </div>

    <div id="gameScreen" class="card hidden">
      <h2>🎮 Игра идёт</h2>
      <div id="phaseDisplay" style="color:#f5c542; font-size:1.2rem;">🌙 Ночь</div>
      <div class="log" id="gameLog"></div>
      <div class="role-reveal"><span class="role" id="myRoleDisplay">???</span></div>
      <div id="actionArea"></div>
      <button class="btn btn-secondary" id="leaveGameBtn">🚪 Выйти</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  (function() {
    // --- ПЕРЕКЛЮЧЕНИЕ ИГР ---
    const gameBtns = document.querySelectorAll('.game-btn');
    const bunkerSection = document.getElementById('bunkerSection');
    const onlineSection = document.getElementById('onlineSection');

    function switchGame(game) {
      gameBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.game === game));
      if (game === 'bunker') {
        bunkerSection.classList.remove('hidden');
        onlineSection.classList.add('hidden');
      } else {
        bunkerSection.classList.add('hidden');
        onlineSection.classList.remove('hidden');
        document.getElementById('onlineGameType').textContent = `Игра: ${game === 'mafia' ? '🔪 Мафия' : '🕵️ Шпион'}`;
      }
    }

    gameBtns.forEach(btn => {
      btn.addEventListener('click', () => switchGame(btn.dataset.game));
    });

    // --- БУНКЕР ---
    const bunkerCards = document.getElementById('bunkerCards');
    const catastropheContent = document.getElementById('catastropheContent');
    const bunkerContent = document.getElementById('bunkerContent');

    function renderBunkerCards(cards) {
      bunkerCards.innerHTML = '';
      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card-item';
        const descHtml = card.desc ? `<div class="card-desc">${card.desc}</div>` : '';
        div.innerHTML = `
          <div class="card-title">${card.title}</div>
          <div class="card-value">${card.value}</div>
          ${descHtml}
        `;
        bunkerCards.appendChild(div);
      });
    }

    async function fetchBunkerCards() {
      try {
        const res = await fetch('/api/game/bunker');
        const data = await res.json();
        renderBunkerCards(data);
      } catch(e) {
        bunkerCards.innerHTML = '<p style="color:#667;">⚠️ Ошибка загрузки</p>';
      }
    }

    async function fetchCatastrophe() {
      try {
        const res = await fetch('/api/catastrophe');
        const data = await res.json();
        catastropheContent.innerHTML = `<span class="info-chip"><span class="label">${data.catastrophe}</span></span>`;
      } catch(e) {
        catastropheContent.innerHTML = '<span class="info-empty">⚠️ Ошибка</span>';
      }
    }

    async function fetchBunkerContents() {
      try {
        const res = await fetch('/api/bunker');
        const data = await res.json();
        let html = '';
        data.forEach(item => {
          html += `<div class="info-chip"><span class="label">${item.item}:</span> ${item.amount}</div>`;
          if (item.desc) html += `<div style="font-size:0.7rem;color:#8899aa;margin-left:10px;">${item.desc}</div>`;
        });
        bunkerContent.innerHTML = html || '<span class="info-empty">Пусто</span>';
      } catch(e) {
        bunkerContent.innerHTML = '<span class="info-empty">⚠️ Ошибка</span>';
      }
    }

    document.getElementById('bunkerStartBtn').addEventListener('click', fetchBunkerCards);
    document.getElementById('bunkerRestartBtn').addEventListener('click', () => {
      bunkerCards.innerHTML = '';
      catastropheContent.innerHTML = '<span class="info-empty">Не выбрана</span>';
      bunkerContent.innerHTML = '<span class="info-empty">Не загружено</span>';
    });
    document.getElementById('bunkerCatastropheBtn').addEventListener('click', fetchCatastrophe);
    document.getElementById('bunkerContentsBtn').addEventListener('click', fetchBunkerContents);

    // --- ПРАВДА ИЛИ ДЕЙСТВИЕ ---
    const truthOrDareBtn = document.getElementById('truthOrDareBtn');
    const truthOrDareResult = document.getElementById('truthOrDareResult');
    const truthOrDareMessage = document.getElementById('truthOrDareMessage');
    const helpBtn = document.getElementById('helpBtn');

    truthOrDareBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/truthordare');
        const data = await res.json();
        truthOrDareResult.style.display = 'flex';
        truthOrDareMessage.textContent = data.message;
        if (data.type === 'skip') {
          helpBtn.style.display = 'none';
        } else {
          helpBtn.style.display = 'inline-block';
        }
      } catch(e) {
        truthOrDareResult.style.display = 'flex';
        truthOrDareMessage.textContent = '⚠️ Ошибка загрузки';
        helpBtn.style.display = 'none';
      }
    });

    helpBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/help');
        const data = await res.json();
        truthOrDareMessage.textContent = data.message;
        helpBtn.style.display = 'none';
      } catch(e) {
        truthOrDareMessage.textContent = '⚠️ Ошибка помощи';
      }
    });

    // --- ОНЛАЙН ---
    const socket = io();

    const lobbyScreen = document.getElementById('lobbyScreen');
    const roomScreen = document.getElementById('roomScreen');
    const gameScreen = document.getElementById('gameScreen');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playersCountDisplay = document.getElementById('playersCountDisplay');
    const playerList = document.getElementById('playerList');
    const gameLog = document.getElementById('gameLog');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const myRoleDisplay = document.getElementById('myRoleDisplay');
    const actionArea = document.getElementById('actionArea');
    const onlineError = document.getElementById('onlineError');

    const playerNameInput = document.getElementById('playerNameInput');
    const roomCodeInput = document.getElementById('roomCodeInput');

    let currentRoom = null;
    let isHost = false;

    function showOnlineError(msg) {
      onlineError.textContent = msg;
      setTimeout(() => onlineError.textContent = '', 5000);
    }

    function updatePlayerList(players) {
      playerList.innerHTML = '';
      players.forEach(p => {
        const chip = document.createElement('span');
        chip.className = 'player-chip' + (p.isHost ? ' host' : '');
        chip.textContent = p.name + (p.isHost ? ' 👑' : '');
        playerList.appendChild(chip);
      });
      playersCountDisplay.textContent = `Игроков: ${players.length}`;
    }

    function updateGameLog(entries) {
      gameLog.innerHTML = '';
      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.textContent = entry;
        gameLog.appendChild(div);
      });
      gameLog.scrollTop = gameLog.scrollHeight;
    }

    function renderActionArea(data) {
      actionArea.innerHTML = '';
      const gameType = data.gameType || 'mafia';
      if (gameType === 'mafia') {
        if (data.phase === 'night') {
          const role = data.roles ? data.roles[socket.id] : '';
          if (role === 'Мафия' || role === 'Дон мафии') {
            const alive = data.alive || [];
            if (alive.length > 0) {
              const select = document.createElement('select');
              select.id = 'mafiaTarget';
              alive.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
              });
              const btn = document.createElement('button');
              btn.className = 'btn btn-danger btn-small';
              btn.textContent = '🔪 Убить';
              btn.addEventListener('click', () => {
                const target = select.value;
                if (target) {
                  socket.emit('nightVote', { roomCode: currentRoom, targetPlayerName: target });
                  actionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
                }
              });
              actionArea.appendChild(select);
              actionArea.appendChild(btn);
            }
          } else {
            actionArea.innerHTML = '<p style="color:#aab;">🌙 Город засыпает... Ожидайте утра.</p>';
          }
        } else if (data.phase === 'day') {
          const alive = data.alive || [];
          if (alive.length > 0) {
            const select = document.createElement('select');
            select.id = 'dayTarget';
            alive.forEach(name => {
              const opt = document.createElement('option');
              opt.value = name;
              opt.textContent = name;
              select.appendChild(opt);
            });
            const btn = document.createElement('button');
            btn.className = 'btn btn-secondary btn-small';
            btn.textContent = '🗳️ Голосовать';
            btn.addEventListener('click', () => {
              const target = select.value;
              if (target) {
                socket.emit('dayVote', { roomCode: currentRoom, targetPlayerName: target });
                actionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
              }
            });
            actionArea.appendChild(select);
            actionArea.appendChild(btn);
          }
        }
      } else if (gameType === 'spy') {
        const alive = data.alive || [];
        if (alive.length > 0) {
          const select = document.createElement('select');
          select.id = 'spyTarget';
          alive.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
          });
          const btn = document.createElement('button');
          btn.className = 'btn btn-secondary btn-small';
          btn.textContent = '🕵️ Указать на шпиона';
          btn.addEventListener('click', () => {
            const target = select.value;
            if (target) {
              socket.emit('dayVote', { roomCode: currentRoom, targetPlayerName: target });
              actionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
            }
          });
          actionArea.appendChild(select);
          actionArea.appendChild(btn);
        }
      }
    }

    function leaveRoom() {
      socket.disconnect();
      socket.connect();
      lobbyScreen.classList.remove('hidden');
      roomScreen.classList.add('hidden');
      gameScreen.classList.add('hidden');
      currentRoom = null;
    }

    socket.on('roomCreated', (data) => {
      currentRoom = data.roomCode;
      isHost = true;
      lobbyScreen.classList.add('hidden');
      roomScreen.classList.remove('hidden');
      roomCodeDisplay.textContent = data.roomCode;
    });

    socket.on('joinedRoom', (data) => {
      currentRoom = data.roomCode;
      isHost = false;
      lobbyScreen.classList.add('hidden');
      roomScreen.classList.remove('hidden');
      roomCodeDisplay.textContent = data.roomCode;
    });

    socket.on('playersUpdate', updatePlayerList);

    socket.on('gameStarted', (data) => {
      roomScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      phaseDisplay.textContent = data.phase === 'night' ? '🌙 Ночь' : '☀️ День';
      const role = data.roles ? data.roles[socket.id] : '???';
      myRoleDisplay.textContent = role;
      if (data.gameType === 'spy' && data.location) {
        myRoleDisplay.textContent += ` | Локация: ${data.location}`;
      }
      updateGameLog(data.log || []);
      renderActionArea(data);
    });

    socket.on('nightResult', (data) => {
      updateGameLog([`🌙 Мафия выбрала ${data.kill}`]);
    });

    socket.on('dayResult', (data) => {
      updateGameLog([`☀️ Игрок ${data.eliminated} выгнан!`]);
    });

    socket.on('gameEnded', (data) => {
      updateGameLog([`🏆 Победили: ${data.winner}!`]);
      phaseDisplay.textContent = `🏆 Игра окончена! Победили: ${data.winner}`;
      actionArea.innerHTML = '<p style="color:#f5c542;">Игра завершена. Нажмите "Выйти".</p>';
    });

    socket.on('error', showOnlineError);

    document.getElementById('createRoomBtn').addEventListener('click', () => {
      const name = playerNameInput.value.trim() || 'Игрок';
      const gameType = document.getElementById('onlineGameType').textContent.includes('Мафия') ? 'mafia' : 'spy';
      socket.emit('createRoom', { playerName: name, gameType });
    });

    document.getElementById('joinRoomBtn').addEventListener('click', () => {
      const name = playerNameInput.value.trim() || 'Игрок';
      const code = roomCodeInput.value.trim().toUpperCase();
      if (!code) { showOnlineError('Введите код комнаты'); return; }
      socket.emit('joinRoom', { roomCode: code, playerName: name });
    });

    document.getElementById('startGameBtn').addEventListener('click', () => {
      if (currentRoom) socket.emit('startGame', currentRoom);
    });

    document.getElementById('leaveRoomBtn').addEventListener('click', leaveRoom);
    document.getElementById('leaveGameBtn').addEventListener('click', leaveRoom);

    // --- ЗАПУСК ---
    switchGame('bunker');
    fetchBunkerCards();
  })();
</script>
</body>
</html>
