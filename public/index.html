<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Бункер 8.2</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at 30% 10%, #1a2a2a, #050708);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      color: #e8e8e8;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container { width:100%; max-width:1300px; display:flex; flex-direction:column; align-items:center; }
    .header { text-align:center; margin-bottom:20px; width:100%; }
    .header h1 {
      font-size:2.8rem; font-weight:800; color:#f5c542;
      text-shadow: 0 0 40px #f5c54233, 0 0 80px #f5c54211;
      letter-spacing:2px;
    }
    .header .sub { color:#8899aa; font-size:0.9rem; border-top:1px solid #2a3a3a; padding-top:8px; display:inline-block; }

    .btn-group {
      display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:20px; width:100%;
    }
    .btn {
      background:#f5c542; border:none; color:#0b0e14; font-weight:700;
      padding:14px 32px; border-radius:60px; cursor:pointer;
      transition:0.15s; font-size:1.1rem; box-shadow:0 0 30px #f5c54244;
    }
    .btn:active { transform:scale(0.94); }
    .btn-secondary { background:#1a2a2a; color:#c0d0d0; box-shadow:none; }
    .btn-secondary:hover { background:#2a3a3a; }
    .btn-outline { background:transparent; border:1px solid #f5c542; color:#f5c542; box-shadow:none; }
    .btn-outline:hover { background:#f5c54222; }
    .btn-danger { background:#6a1a1a; color:#ff8888; box-shadow:none; }
    .btn-small { font-size:0.8rem; padding:6px 16px; }
    .btn-green { background:#1a5a2a; color:#7aff7a; box-shadow:none; }

    .hidden { display:none !important; }

    .cards-grid {
      display:flex; flex-wrap:wrap; justify-content:center; gap:14px;
      width:100%; margin:16px 0;
    }
    .card {
      background:#141c1c; border-left:6px solid #f5c542; border-radius:14px;
      padding:14px 16px; flex:1 1 200px; max-width:250px; min-width:160px;
      box-shadow:0 8px 30px #00000099; text-align:center;
      display:flex; flex-direction:column; justify-content:center; min-height:120px;
      cursor:pointer; transition:0.2s; user-select:none;
    }
    .card:hover { transform:translateY(-4px); border-color:#f5a542; }
    .card .card-title { font-size:0.6rem; text-transform:uppercase; letter-spacing:1.5px; color:#f5c542; margin-bottom:4px; }
    .card .card-value { font-size:1.1rem; font-weight:600; color:#f0f0f0; line-height:1.3; word-break:break-word; }
    .card .card-status { font-size:0.6rem; color:#667; margin-top:6px; }
    .card.revealed { border-color:#7aff7a; background:#1a2a1a; }
    .card.revealed .card-status { color:#7aff7a; }
    .card.hidden-card { border-color:#555; opacity:0.5; }
    .card.hidden-card .card-value { color:#889; }

    .notebook {
      background:#101818; border:1px solid #2a3a3a; border-radius:16px;
      padding:16px 20px; width:100%; max-width:1000px; margin:16px 0;
    }
    .notebook-header {
      display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; gap:10px; border-bottom:1px solid #2a3a3a;
      padding-bottom:10px; margin-bottom:12px;
    }
    .notebook-header h3 { color:#f5c542; font-weight:400; letter-spacing:1px; }
    .notebook-header .badge { background:#1a2a2a; padding:4px 16px; border-radius:30px; font-size:0.8rem; color:#aab; }

    .player-tabs {
      display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;
    }
    .player-tab {
      background:#0a1414; border:1px solid #2a3a3a; padding:6px 16px;
      border-radius:30px; cursor:pointer; font-size:0.85rem;
      transition:0.1s; color:#aab;
    }
    .player-tab.active { background:#f5c542; color:#0b0e14; border-color:#f5c542; }
    .player-tab:hover { border-color:#f5c542; }

    .add-player-form {
      display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px;
    }
    .add-player-form input {
      background:#0a1414; border:1px solid #2a3a3a; color:#e8e8e8;
      padding:8px 14px; border-radius:40px; font-size:0.9rem;
      outline:none; width:160px;
    }
    .add-player-form input:focus { border-color:#f5c542; }

    .manual-add {
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      background:#0a1414; padding:10px 14px; border-radius:40px;
      margin-bottom:12px; border:1px solid #2a3a3a;
    }
    .manual-add select, .manual-add input {
      background:#0a1414; border:1px solid #2a3a3a; color:#e8e8e8;
      padding:6px 14px; border-radius:40px; font-size:0.85rem;
      outline:none;
    }
    .manual-add select:focus, .manual-add input:focus { border-color:#f5c542; }
    .manual-add input { flex:1; min-width:120px; }

    .notebook-entries { max-height:350px; overflow-y:auto; }
    .notebook-entry {
      background:#0a1414; padding:6px 14px; border-radius:8px;
      margin:4px 0; display:flex; justify-content:space-between;
      align-items:center; font-size:0.9rem; border-left:3px solid #f5c542;
    }
    .notebook-entry .entry-label { color:#f5c542; font-weight:600; min-width:80px; }
    .notebook-entry .entry-value { color:#e8e8e8; flex:1; margin:0 10px; cursor:pointer; }
    .notebook-entry .entry-actions button { background:none; border:none; color:#667; cursor:pointer; font-size:0.8rem; }
    .notebook-entry .entry-actions button:hover { color:#ff6666; }

    .notebook-empty { color:#556; font-style:italic; text-align:center; padding:12px 0; }

    .info-cards {
      display:flex; flex-wrap:wrap; gap:16px; justify-content:center; width:100%; margin:10px 0;
    }
    .info-card {
      background:#101818; border:1px solid #2a3a3a; border-radius:14px;
      padding:16px 22px; flex:1 1 180px; max-width:250px; text-align:center;
    }
    .info-card h4 { color:#f5c542; font-weight:400; letter-spacing:1px; }
    .info-card .value { font-size:1.4rem; font-weight:700; color:#f0f0f0; }

    .footer {
      margin-top:20px; padding:12px 0; width:100%; text-align:center;
      border-top:1px solid #1a2a2a; color:#445; font-size:0.7rem;
    }
    .footer span { color:#667; font-weight:400; }

    @media (max-width:600px) {
      .header h1 { font-size:2rem; }
      .btn { font-size:1rem; padding:12px 24px; }
      .card { flex:1 1 100%; max-width:100%; min-height:90px; }
      .card .card-value { font-size:1rem; }
      .manual-add { flex-direction:column; align-items:stretch; }
      .info-card { flex:1 1 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🏚️ БУНКЕР 8.2</h1>
    <div class="sub">8 карт · эпидемии · бункер · новый контент</div>
  </div>

  <div class="btn-group">
    <button class="btn" id="startBtn">▶ НАЧАТЬ</button>
    <button class="btn btn-secondary hidden" id="restartBtn">⟳ НАЧАТЬ ЗАНОВО</button>
    <button class="btn btn-outline" id="catastropheBtn">🌪️ Рандомная эпидемия</button>
    <button class="btn btn-outline" id="bunkerBtn">📦 Содержимое бункера</button>
  </div>

  <div class="cards-grid" id="cardsContainer"></div>

  <div class="info-cards" id="infoCards"></div>

  <div class="notebook">
    <div class="notebook-header">
      <h3>📓 Блокнот</h3>
      <span class="badge" id="notebookCount">0 игроков</span>
    </div>

    <div class="add-player-form">
      <input type="text" id="newPlayerInput" placeholder="Имя игрока" value="Игрок 1">
      <button class="btn btn-secondary btn-small" id="addPlayerBtn">➕ Добавить</button>
      <button class="btn btn-danger btn-small" id="removePlayerBtn" style="display:none;">✖ Удалить</button>
    </div>

    <div class="player-tabs" id="playerTabs"></div>

    <div class="manual-add">
      <select id="manualCategory">
        <option value="Профессия">Профессия</option>
        <option value="Возраст">Возраст</option>
        <option value="Факт">Факт</option>
        <option value="Хобби">Хобби</option>
        <option value="Багаж">Багаж</option>
        <option value="Здоровье">Здоровье</option>
        <option value="Характер">Характер</option>
        <option value="Фобия">Фобия</option>
        <option value="Другое">Другое</option>
      </select>
      <input type="text" id="manualValue" placeholder="Что выпало игроку?">
      <button class="btn btn-green btn-small" id="manualAddBtn">➕ Добавить карту</button>
    </div>

    <div class="notebook-entries" id="notebookEntries">
      <div class="notebook-empty">Выберите игрока</div>
    </div>

    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-secondary btn-small" id="clearNotebookBtn">🧹 Очистить всё</button>
    </div>
  </div>

  <div class="footer">
    <span>Спортивный плейбой, филантроп, величайший гений — Тимур</span>
  </div>
</div>

<script>
  (function() {
    // --- DOM ---
    const container = document.getElementById('cardsContainer');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const catastropheBtn = document.getElementById('catastropheBtn');
    const bunkerBtn = document.getElementById('bunkerBtn');
    const infoCards = document.getElementById('infoCards');

    const playerTabs = document.getElementById('playerTabs');
    const notebookEntries = document.getElementById('notebookEntries');
    const notebookCount = document.getElementById('notebookCount');
    const newPlayerInput = document.getElementById('newPlayerInput');
    const addPlayerBtn = document.getElementById('addPlayerBtn');
    const removePlayerBtn = document.getElementById('removePlayerBtn');
    const clearNotebookBtn = document.getElementById('clearNotebookBtn');
    const manualCategory = document.getElementById('manualCategory');
    const manualValue = document.getElementById('manualValue');
    const manualAddBtn = document.getElementById('manualAddBtn');

    // --- Состояние ---
    let currentCards = [];
    let currentPlayer = '';
    let allPlayers = [];

    // --- localStorage ---
    const STORAGE_KEY = 'bunker82_data';

    function loadState() {
      try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return null; const data = JSON.parse(raw); if (data.cards && data.players && data.notebook) return data; return null; } catch { return null; }
    }
    function saveState() {
      const notebook = getNotebook();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ cards: currentCards, players: allPlayers, notebook, currentPlayer }));
    }
    function getNotebook() {
      try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return {}; const data = JSON.parse(raw); return data.notebook || {}; } catch { return {}; }
    }
    function saveNotebook(notebook) {
      const state = loadState() || { cards: [], players: [], notebook: {}, currentPlayer: '' };
      state.notebook = notebook;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function getPlayerEntries(playerName) {
      const notebook = getNotebook();
      return notebook[playerName] || [];
    }
    function setPlayerEntries(playerName, entries) {
      const notebook = getNotebook();
      notebook[playerName] = entries;
      saveNotebook(notebook);
    }
    function addEntryToPlayer(playerName, title, value) {
      const entries = getPlayerEntries(playerName);
      entries.push({ title, value });
      setPlayerEntries(playerName, entries);
    }
    function deleteEntryFromPlayer(playerName, index) {
      const entries = getPlayerEntries(playerName);
      entries.splice(index, 1);
      setPlayerEntries(playerName, entries);
    }
    function clearPlayerEntries(playerName) {
      setPlayerEntries(playerName, []);
    }

    // --- Рендер карт ---
    function renderCards() {
      container.innerHTML = '';
      if (!currentCards || currentCards.length === 0) return;
      currentCards.forEach((card) => {
        const div = document.createElement('div');
        div.className = 'card';
        if (card.revealed) div.classList.add('revealed');
        if (card.hidden) div.classList.add('hidden-card');
        const displayValue = card.hidden ? '🔒 Скрыто' : (card.revealed ? card.value : '❓');
        div.innerHTML = `
          <div class="card-title">${card.title}</div>
          <div class="card-value">${displayValue}</div>
          <div class="card-status">${card.hidden ? '🔒 Скрыта' : (card.revealed ? '✓ Открыта' : '👆 Нажми')}</div>
        `;
        div.addEventListener('click', () => {
          if (card.revealed) {
            card.hidden = !card.hidden;
          } else {
            card.revealed = true;
            card.hidden = false;
            if (currentPlayer) addEntryToPlayer(currentPlayer, card.title, card.value);
          }
          renderCards();
          renderNotebook();
          saveState();
        });
        container.appendChild(div);
      });
    }

    // --- Рендер блокнота ---
    function renderNotebook() {
      if (!currentPlayer) { notebookEntries.innerHTML = `<div class="notebook-empty">Выберите игрока</div>`; return; }
      const entries = getPlayerEntries(currentPlayer);
      if (entries.length === 0) { notebookEntries.innerHTML = `<div class="notebook-empty">У игрока "${currentPlayer}" пока нет карт</div>`; return; }
      let html = '';
      entries.forEach((e, index) => {
        html += `
          <div class="notebook-entry" data-index="${index}">
            <span class="entry-label">${e.title}:</span>
            <span class="entry-value" data-index="${index}">${e.value}</span>
            <div class="entry-actions">
              <button class="delete-entry" data-index="${index}" title="Удалить">✖</button>
            </div>
          </div>
        `;
      });
      notebookEntries.innerHTML = html;
      document.querySelectorAll('.delete-entry').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const index = parseInt(btn.dataset.index);
          if (confirm(`Удалить эту карту?`)) { deleteEntryFromPlayer(currentPlayer, index); renderNotebook(); saveState(); }
        });
      });
      document.querySelectorAll('.entry-value').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          const index = parseInt(this.dataset.index);
          const currentText = this.textContent;
          const input = document.createElement('input');
          input.type = 'text';
          input.value = currentText;
          input.style.width = 'auto';
          input.style.minWidth = '100px';
          input.style.background = '#0a1414';
          input.style.color = '#e8e8e8';
          input.style.border = '1px solid #f5c542';
          input.style.borderRadius = '6px';
          input.style.padding = '2px 8px';
          input.style.fontSize = '0.9rem';
          this.replaceWith(input);
          input.focus();
          input.select();
          const saveEdit = () => {
            const newValue = input.value.trim() || currentText;
            const entries = getPlayerEntries(currentPlayer);
            if (entries[index]) { entries[index].value = newValue; setPlayerEntries(currentPlayer, entries); }
            renderNotebook(); saveState();
          };
          input.addEventListener('blur', saveEdit);
          input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { input.blur(); } if (e.key === 'Escape') { input.value = currentText; input.blur(); } });
        });
      });
    }

    // --- Рендер вкладок ---
    function renderTabs() {
      if (allPlayers.length === 0) {
        playerTabs.innerHTML = '<span style="color:#556;font-size:0.85rem;">Нет игроков. Добавьте!</span>';
        notebookCount.textContent = '0 игроков';
        removePlayerBtn.style.display = 'none';
        return;
      }
      let html = '';
      allPlayers.forEach(p => { const active = p === currentPlayer ? 'active' : ''; html += `<div class="player-tab ${active}" data-player="${p}">${p}</div>`; });
      playerTabs.innerHTML = html;
      notebookCount.textContent = `${allPlayers.length} игроков`;
      removePlayerBtn.style.display = 'block';
      document.querySelectorAll('.player-tab').forEach(tab => {
        tab.addEventListener('click', () => { currentPlayer = tab.dataset.player; renderTabs(); renderNotebook(); saveState(); });
      });
    }

    // --- Добавление/удаление игроков ---
    function addPlayer() {
      const name = newPlayerInput.value.trim();
      if (!name) return;
      if (allPlayers.includes(name)) { alert('Такой игрок уже есть'); return; }
      allPlayers.push(name);
      if (!currentPlayer) currentPlayer = name;
      const notebook = getNotebook();
      if (!notebook[name]) { notebook[name] = []; saveNotebook(notebook); }
      newPlayerInput.value = '';
      renderTabs(); renderNotebook(); saveState();
    }
    function removePlayer() {
      if (!currentPlayer) return;
      if (!confirm(`Удалить игрока "${currentPlayer}" и все его карты?`)) return;
      const notebook = getNotebook();
      delete notebook[currentPlayer];
      saveNotebook(notebook);
      allPlayers = allPlayers.filter(p => p !== currentPlayer);
      if (allPlayers.length > 0) { currentPlayer = allPlayers[0]; } else { currentPlayer = ''; }
      renderTabs(); renderNotebook(); saveState();
    }

    // --- Ручное добавление карты ---
    function manualAddCard() {
      if (!currentPlayer) { alert('Сначала выберите игрока'); return; }
      const category = manualCategory.value;
      const value = manualValue.value.trim();
      if (!value) { alert('Введите значение карты'); return; }
      addEntryToPlayer(currentPlayer, category, value);
      manualValue.value = '';
      renderNotebook(); saveState();
    }

    // --- Загрузка карт с сервера ---
    async function fetchCards() {
      try {
        const res = await fetch('/api/start');
        if (!res.ok) throw new Error('Ошибка сервера');
        const raw = await res.json();
        currentCards = raw.map(c => ({ title: c.title, value: c.value, revealed: false, hidden: false }));
        renderCards();
        startBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
        saveState();
      } catch(e) {
        container.innerHTML = '<p style="color:#667;">⚠️ Ошибка загрузки</p>';
        console.error(e);
      }
    }

    // --- Сброс игры ---
    function resetGame() {
      currentCards = [];
      container.innerHTML = '';
      restartBtn.classList.add('hidden');
      startBtn.classList.remove('hidden');
      saveState();
    }

    // --- Очистка блокнота ---
    function clearCurrentPlayerNotebook() {
      if (!currentPlayer) return;
      if (!confirm(`Очистить все карты для "${currentPlayer}"?`)) return;
      clearPlayerEntries(currentPlayer);
      renderNotebook(); saveState();
    }

    // --- Рандомная эпидемия ---
    async function fetchCatastrophe() {
      try {
        const res = await fetch('/api/catastrophe');
        if (!res.ok) throw new Error('Ошибка');
        const data = await res.json();
        infoCards.innerHTML = `
          <div class="info-card"><h4>🌪️ Катастрофа</h4><div class="value">${data.catastrophe}</div></div>
        `;
      } catch(e) { infoCards.innerHTML = '<div class="info-card"><h4>⚠️ Ошибка</h4></div>'; }
    }

    // --- Содержимое бункера ---
    async function fetchBunker() {
      try {
        const res = await fetch('/api/bunker');
        if (!res.ok) throw new Error('Ошибка');
        const data = await res.json();
        let html = '';
        data.forEach(item => {
          html += `<div class="info-card"><h4>📦 ${item.item}</h4><div class="value">${item.amount}</div></div>`;
        });
        infoCards.innerHTML = html;
      } catch(e) { infoCards.innerHTML = '<div class="info-card"><h4>⚠️ Ошибка</h4></div>'; }
    }

    // --- Восстановление состояния ---
    function restoreState() {
      const saved = loadState();
      if (!saved) return false;
      if (saved.cards && saved.cards.length > 0) {
        currentCards = saved.cards;
        renderCards();
        startBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
      }
      if (saved.players && saved.players.length > 0) {
        allPlayers = saved.players;
        currentPlayer = saved.currentPlayer || allPlayers[0];
        renderTabs(); renderNotebook();
      }
      return true;
    }

    // --- Обработчики ---
    startBtn.addEventListener('click', fetchCards);
    restartBtn.addEventListener('click', resetGame);
    catastropheBtn.addEventListener('click', fetchCatastrophe);
    bunkerBtn.addEventListener('click', fetchBunker);
    addPlayerBtn.addEventListener('click', addPlayer);
    newPlayerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addPlayer(); });
    removePlayerBtn.addEventListener('click', removePlayer);
    clearNotebookBtn.addEventListener('click', clearCurrentPlayerNotebook);
    manualAddBtn.addEventListener('click', manualAddCard);
    manualValue.addEventListener('keydown', (e) => { if (e.key === 'Enter') manualAddCard(); });

    // --- Инициализация ---
    const restored = restoreState();
    if (!restored) {
      allPlayers = ['Игрок 1'];
      currentPlayer = 'Игрок 1';
      const notebook = getNotebook();
      if (!notebook['Игрок 1']) { notebook['Игрок 1'] = []; saveNotebook(notebook); }
      renderTabs(); renderNotebook(); saveState();
    }
  })();
</script>

</body>
</html>
