<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Игровой портал</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e14;
      background-image: radial-gradient(circle at 20% 30%, #1a2a3a, #05080a);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      color: #e8e8e8;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app { max-width: 1100px; width: 100%; }

    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #1a2a3a;
      padding-bottom: 10px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f5c542, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .header .sub { color: #8899aa; font-size: 0.9rem; }

    /* ВКЛАДКИ */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .tab-btn {
      background: #141c24;
      border: 1px solid #2a3a4a;
      color: #c0d0e0;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn:hover { border-color: #f5c542; box-shadow: 0 0 30px #f5c54222; }
    .tab-btn.active { background: #f5c542; color: #0a0e14; border-color: #f5c542; }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* КАРТЫ */
    .card {
      background: #101820;
      border: 1px solid #1a2a3a;
      border-radius: 16px;
      padding: 20px;
      margin: 12px 0;
    }
    .card h2 { color: #f5c542; font-weight: 400; margin-bottom: 10px; font-size: 1.2rem; }

    .input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .input-group input, .input-group select {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      color: #e8e8e8;
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 1rem;
      flex: 1;
      min-width: 120px;
      outline: none;
    }
    .input-group input:focus { border-color: #f5c542; }

    .btn {
      background: #f5c542;
      border: none;
      color: #0a0e14;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.15s;
      font-size: 1rem;
    }
    .btn:active { transform: scale(0.94); }
    .btn-secondary { background: #1a2a3a; color: #c0d0e0; }
    .btn-secondary:hover { background: #2a3a4a; }
    .btn-success { background: #1a5a2a; color: #7aff7a; }
    .btn-danger { background: #6a1a1a; color: #ff8888; }
    .btn-outline { background: transparent; border: 1px solid #f5c542; color: #f5c542; }
    .btn-outline:hover { background: #f5c54222; }
    .btn-small { font-size: 0.8rem; padding: 6px 16px; }
    .hidden { display: none !important; }

    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin: 12px 0;
    }
    .card-item {
      background: #141c24;
      border-left: 6px solid #f5c542;
      border-radius: 14px;
      padding: 14px 18px;
      flex: 1 1 180px;
      max-width: 230px;
      min-width: 150px;
      text-align: center;
      box-shadow: 0 8px 30px #00000099;
      cursor: pointer;
      transition: 0.2s;
    }
    .card-item:hover { transform: translateY(-4px); border-color: #ffa500; }
    .card-item .card-title { font-size: 0.6rem; text-transform: uppercase; color: #f5c542; }
    .card-item .card-value { font-size: 1.1rem; font-weight: 600; color: #f0f0f0; }
    .card-item .card-desc { font-size: 0.7rem; color: #8899aa; margin-top: 4px; font-style: italic; }

    .info-panels {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 10px 0;
    }
    .info-panel {
      background: #101820;
      border: 1px solid #1a2a3a;
      border-radius: 16px;
      padding: 12px 18px;
      flex: 1;
      min-width: 200px;
    }
    .info-panel h4 { color: #f5c542; font-weight: 400; margin-bottom: 6px; }
    .info-chip {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      border-radius: 30px;
      padding: 4px 14px;
      display: inline-block;
      margin: 3px;
      font-size: 0.85rem;
    }
    .info-chip .label { color: #f5c542; font-weight: 600; }
    .info-empty { color: #556; font-style: italic; font-size: 0.85rem; }

    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }
    .player-chip {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.9rem;
    }
    .player-chip.host { border-color: #f5c542; background: #1a2a2a; }

    .log {
      background: #0a141c;
      border-radius: 12px;
      padding: 12px 16px;
      max-height: 200px;
      overflow-y: auto;
      margin: 10px 0;
      font-size: 0.9rem;
      color: #aab;
      border: 1px solid #1a2a3a;
    }
    .log .entry { padding: 4px 0; border-bottom: 1px solid #0a141c; }

    .role-reveal {
      background: #1a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      margin: 10px 0;
      text-align: center;
      font-size: 1.2rem;
    }
    .role-reveal .role { color: #f5c542; font-weight: 700; }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .tab-btn { font-size: 0.8rem; padding: 8px 16px; }
      .card-item { flex: 1 1 100%; max-width: 100%; }
      .info-panel { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🎮 Игровой портал</h1>
    <div class="sub">Выбери игру</div>
  </div>

  <!-- ВКЛАДКИ -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="bunker">🏚️ Бункер</button>
    <button class="tab-btn" data-tab="mafia">🔪 Мафия</button>
    <button class="tab-btn" data-tab="spy">🕵️ Шпион</button>
  </div>

  <!-- ============================================================ -->
  <!-- ВКЛАДКА: БУНКЕР -->
  <!-- ============================================================ -->
  <div id="tab-bunker" class="tab-content active">
    <div class="card">
      <h2>🏚️ Бункер</h2>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <button class="btn" id="bunkerStartBtn">▶ Начать</button>
        <button class="btn btn-secondary" id="bunkerRestartBtn">⟳ Заново</button>
        <button class="btn btn-outline" id="bunkerCatastropheBtn">🌪️ Эпидемия</button>
        <button class="btn btn-outline" id="bunkerContentsBtn">📦 Бункер</button>
        <button class="btn btn-outline" id="truthOrDareBtn">🎲 Правда или Действие</button>
      </div>

      <div id="truthOrDareResult" style="margin-top:10px; padding:12px 16px; background:#1a2a2a; border-radius:12px; font-size:1.1rem; display:none; align-items:center; flex-wrap:wrap; gap:10px;">
        <span id="truthOrDareMessage"></span>
        <button class="btn btn-secondary btn-small" id="helpBtn">🤝 Помощь зала</button>
      </div>

      <div class="info-panels">
        <div class="info-panel" id="catastrophePanel">
          <h4>🌪️ Катастрофа / Эпидемия</h4>
          <div id="catastropheContent"><span class="info-empty">Не выбрана</span></div>
        </div>
        <div class="info-panel" id="bunkerPanel">
          <h4>📦 Содержимое бункера</h4>
          <div id="bunkerContent"><span class="info-empty">Не загружено</span></div>
        </div>
      </div>

      <div class="cards-grid" id="bunkerCards"></div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- ВКЛАДКА: МАФИЯ -->
  <!-- ============================================================ -->
  <div id="tab-mafia" class="tab-content">
    <div id="mafiaLobby" class="card">
      <h2>🔪 Мафия — Вход</h2>
      <div class="input-group" style="margin-bottom:10px;">
        <input type="text" id="mafiaPlayerName" placeholder="Ваш ник" value="Игрок">
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="mafiaCreateBtn">➕ Создать комнату</button>
        <div style="display:flex; gap:6px; flex:1; min-width:200px;">
          <input type="text" id="mafiaRoomCode" placeholder="Код комнаты" style="flex:1; background:#0a141c; border:1px solid #1a2a3a; color:#e8e8e8; padding:10px 16px; border-radius:30px; font-size:1rem; outline:none;">
          <button class="btn btn-secondary" id="mafiaJoinBtn">🔗 Войти</button>
        </div>
      </div>
      <div id="mafiaError" style="color:#ff6666; margin-top:8px;"></div>
    </div>

    <div id="mafiaRoom" class="card hidden">
      <h2>📦 Комната: <span id="mafiaRoomCodeDisplay">---</span></h2>
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
        <span id="mafiaPlayersCount" style="color:#aab;">Игроков: 0</span>
      </div>
      <div class="player-list" id="mafiaPlayerList"></div>
      <button class="btn btn-success" id="mafiaStartBtn">🚀 Начать игру</button>
      <button class="btn btn-secondary" id="mafiaLeaveBtn">🚪 Выйти</button>
    </div>

    <div id="mafiaGame" class="card hidden">
      <h2>🎮 Мафия — игра</h2>
      <div id="mafiaPhase" style="color:#f5c542; font-size:1.2rem;">🌙 Ночь</div>
      <div class="log" id="mafiaLog"></div>
      <div class="role-reveal"><span class="role" id="mafiaMyRole">???</span></div>
      <div id="mafiaActionArea"></div>
      <button class="btn btn-secondary" id="mafiaLeaveGameBtn">🚪 Выйти</button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- ВКЛАДКА: ШПИОН -->
  <!-- ============================================================ -->
  <div id="tab-spy" class="tab-content">
    <div id="spyLobby" class="card">
      <h2>🕵️ Шпион — Вход</h2>
      <div class="input-group" style="margin-bottom:10px;">
        <input type="text" id="spyPlayerName" placeholder="Ваш ник" value="Игрок">
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="spyCreateBtn">➕ Создать комнату</button>
        <div style="display:flex; gap:6px; flex:1; min-width:200px;">
          <input type="text" id="spyRoomCode" placeholder="Код комнаты" style="flex:1; background:#0a141c; border:1px solid #1a2a3a; color:#e8e8e8; padding:10px 16px; border-radius:30px; font-size:1rem; outline:none;">
          <button class="btn btn-secondary" id="spyJoinBtn">🔗 Войти</button>
        </div>
      </div>
      <div id="spyError" style="color:#ff6666; margin-top:8px;"></div>
    </div>

    <div id="spyRoom" class="card hidden">
      <h2>📦 Комната: <span id="spyRoomCodeDisplay">---</span></h2>
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
        <span id="spyPlayersCount" style="color:#aab;">Игроков: 0</span>
      </div>
      <div class="player-list" id="spyPlayerList"></div>
      <button class="btn btn-success" id="spyStartBtn">🚀 Начать игру</button>
      <button class="btn btn-secondary" id="spyLeaveBtn">🚪 Выйти</button>
    </div>

    <div id="spyGame" class="card hidden">
      <h2>🎮 Шпион — игра</h2>
      <div id="spyPhase" style="color:#f5c542; font-size:1.2rem;">🕵️ Обсуждение</div>
      <div class="log" id="spyLog"></div>
      <div class="role-reveal"><span class="role" id="spyMyRole">???</span></div>
      <div id="spyActionArea"></div>
      <button class="btn btn-secondary" id="spyLeaveGameBtn">🚪 Выйти</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  (function() {
    // ============================================================
    // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    // ============================================================
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tabContents.forEach(tc => tc.classList.remove('active'));
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ============================================================
    // БУНКЕР
    // ============================================================
    const bunkerCards = document.getElementById('bunkerCards');
    const catastropheContent = document.getElementById('catastropheContent');
    const bunkerContent = document.getElementById('bunkerContent');

    function renderBunkerCards(cards) {
      bunkerCards.innerHTML = '';
      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card-item';
        const descHtml = card.desc ? `<div class="card-desc">${card.desc}</div>` : '';
        div.innerHTML = `
          <div class="card-title">${card.title}</div>
          <div class="card-value">${card.value}</div>
          ${descHtml}
        `;
        bunkerCards.appendChild(div);
      });
    }

    async function fetchBunkerCards() {
      try {
        const res = await fetch('/api/game/bunker');
        const data = await res.json();
        renderBunkerCards(data);
      } catch(e) {
        bunkerCards.innerHTML = '<p style="color:#667;">⚠️ Ошибка загрузки</p>';
      }
    }

    async function fetchCatastrophe() {
      try {
        const res = await fetch('/api/catastrophe');
        const data = await res.json();
        catastropheContent.innerHTML = `<span class="info-chip"><span class="label">${data.catastrophe}</span></span>`;
      } catch(e) {
        catastropheContent.innerHTML = '<span class="info-empty">⚠️ Ошибка</span>';
      }
    }

    async function fetchBunkerContents() {
      try {
        const res = await fetch('/api/bunker');
        const data = await res.json();
        let html = '';
        data.forEach(item => {
          html += `<div class="info-chip"><span class="label">${item.item}:</span> ${item.amount}</div>`;
          if (item.desc) html += `<div style="font-size:0.7rem;color:#8899aa;margin-left:10px;">${item.desc}</div>`;
        });
        bunkerContent.innerHTML = html || '<span class="info-empty">Пусто</span>';
      } catch(e) {
        bunkerContent.innerHTML = '<span class="info-empty">⚠️ Ошибка</span>';
      }
    }

    document.getElementById('bunkerStartBtn').addEventListener('click', fetchBunkerCards);
    document.getElementById('bunkerRestartBtn').addEventListener('click', () => {
      bunkerCards.innerHTML = '';
      catastropheContent.innerHTML = '<span class="info-empty">Не выбрана</span>';
      bunkerContent.innerHTML = '<span class="info-empty">Не загружено</span>';
    });
    document.getElementById('bunkerCatastropheBtn').addEventListener('click', fetchCatastrophe);
    document.getElementById('bunkerContentsBtn').addEventListener('click', fetchBunkerContents);

    // --- ПРАВДА ИЛИ ДЕЙСТВИЕ ---
    const truthOrDareBtn = document.getElementById('truthOrDareBtn');
    const truthOrDareResult = document.getElementById('truthOrDareResult');
    const truthOrDareMessage = document.getElementById('truthOrDareMessage');
    const helpBtn = document.getElementById('helpBtn');

    truthOrDareBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/truthordare');
        const data = await res.json();
        truthOrDareResult.style.display = 'flex';
        truthOrDareMessage.textContent = data.message;
        helpBtn.style.display = data.type === 'skip' ? 'none' : 'inline-block';
      } catch(e) {
        truthOrDareResult.style.display = 'flex';
        truthOrDareMessage.textContent = '⚠️ Ошибка загрузки';
        helpBtn.style.display = 'none';
      }
    });

    helpBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/help');
        const data = await res.json();
        truthOrDareMessage.textContent = data.message;
        helpBtn.style.display = 'none';
      } catch(e) {
        truthOrDareMessage.textContent = '⚠️ Ошибка помощи';
      }
    });

    // ============================================================
    // МАФИЯ (ОТДЕЛЬНЫЙ SOCKET)
    // ============================================================
    const mafiaSocket = io();

    const mafiaLobby = document.getElementById('mafiaLobby');
    const mafiaRoom = document.getElementById('mafiaRoom');
    const mafiaGame = document.getElementById('mafiaGame');
    const mafiaRoomCodeDisplay = document.getElementById('mafiaRoomCodeDisplay');
    const mafiaPlayersCount = document.getElementById('mafiaPlayersCount');
    const mafiaPlayerList = document.getElementById('mafiaPlayerList');
    const mafiaLog = document.getElementById('mafiaLog');
    const mafiaPhase = document.getElementById('mafiaPhase');
    const mafiaMyRole = document.getElementById('mafiaMyRole');
    const mafiaActionArea = document.getElementById('mafiaActionArea');
    const mafiaError = document.getElementById('mafiaError');

    const mafiaPlayerName = document.getElementById('mafiaPlayerName');
    const mafiaRoomCode = document.getElementById('mafiaRoomCode');

    let mafiaCurrentRoom = null;
    let mafiaIsHost = false;

    function showMafiaError(msg) {
      mafiaError.textContent = msg;
      setTimeout(() => mafiaError.textContent = '', 5000);
    }

    function updateMafiaPlayerList(players) {
      mafiaPlayerList.innerHTML = '';
      players.forEach(p => {
        const chip = document.createElement('span');
        chip.className = 'player-chip' + (p.isHost ? ' host' : '');
        chip.textContent = p.name + (p.isHost ? ' 👑' : '');
        mafiaPlayerList.appendChild(chip);
      });
      mafiaPlayersCount.textContent = `Игроков: ${players.length}`;
    }

    function updateMafiaLog(entries) {
      mafiaLog.innerHTML = '';
      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.textContent = entry;
        mafiaLog.appendChild(div);
      });
      mafiaLog.scrollTop = mafiaLog.scrollHeight;
    }

    function renderMafiaAction(data) {
      mafiaActionArea.innerHTML = '';
      if (data.phase === 'night') {
        const role = data.roles ? data.roles[mafiaSocket.id] : '';
        if (role === 'Мафия' || role === 'Дон мафии') {
          const alive = data.alive || [];
          if (alive.length > 0) {
            const select = document.createElement('select');
            select.id = 'mafiaTarget';
            alive.forEach(name => {
              const opt = document.createElement('option');
              opt.value = name;
              opt.textContent = name;
              select.appendChild(opt);
            });
            const btn = document.createElement('button');
            btn.className = 'btn btn-danger btn-small';
            btn.textContent = '🔪 Убить';
            btn.addEventListener('click', () => {
              const target = select.value;
              if (target) {
                mafiaSocket.emit('nightVote', { roomCode: mafiaCurrentRoom, targetPlayerName: target });
                mafiaActionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
              }
            });
            mafiaActionArea.appendChild(select);
            mafiaActionArea.appendChild(btn);
          }
        } else {
          mafiaActionArea.innerHTML = '<p style="color:#aab;">🌙 Город засыпает... Ожидайте утра.</p>';
        }
      } else if (data.phase === 'day') {
        const alive = data.alive || [];
        if (alive.length > 0) {
          const select = document.createElement('select');
          select.id = 'dayTarget';
          alive.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
          });
          const btn = document.createElement('button');
          btn.className = 'btn btn-secondary btn-small';
          btn.textContent = '🗳️ Голосовать';
          btn.addEventListener('click', () => {
            const target = select.value;
            if (target) {
              mafiaSocket.emit('dayVote', { roomCode: mafiaCurrentRoom, targetPlayerName: target });
              mafiaActionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
            }
          });
          mafiaActionArea.appendChild(select);
          mafiaActionArea.appendChild(btn);
        }
      }
    }

    function mafiaLeave() {
      mafiaSocket.disconnect();
      mafiaSocket.connect();
      mafiaLobby.classList.remove('hidden');
      mafiaRoom.classList.add('hidden');
      mafiaGame.classList.add('hidden');
      mafiaCurrentRoom = null;
    }

    mafiaSocket.on('roomCreated', (data) => {
      mafiaCurrentRoom = data.roomCode;
      mafiaIsHost = true;
      mafiaLobby.classList.add('hidden');
      mafiaRoom.classList.remove('hidden');
      mafiaRoomCodeDisplay.textContent = data.roomCode;
    });

    mafiaSocket.on('joinedRoom', (data) => {
      mafiaCurrentRoom = data.roomCode;
      mafiaIsHost = false;
      mafiaLobby.classList.add('hidden');
      mafiaRoom.classList.remove('hidden');
      mafiaRoomCodeDisplay.textContent = data.roomCode;
    });

    mafiaSocket.on('playersUpdate', updateMafiaPlayerList);

    mafiaSocket.on('gameStarted', (data) => {
      mafiaRoom.classList.add('hidden');
      mafiaGame.classList.remove('hidden');
      mafiaPhase.textContent = data.phase === 'night' ? '🌙 Ночь' : '☀️ День';
      const role = data.roles ? data.roles[mafiaSocket.id] : '???';
      mafiaMyRole.textContent = role;
      updateMafiaLog(data.log || []);
      renderMafiaAction(data);
    });

    mafiaSocket.on('nightResult', (data) => {
      updateMafiaLog([`🌙 Мафия выбрала ${data.kill}`]);
    });

    mafiaSocket.on('dayResult', (data) => {
      updateMafiaLog([`☀️ Игрок ${data.eliminated} выгнан!`]);
    });

    mafiaSocket.on('gameEnded', (data) => {
      updateMafiaLog([`🏆 Победили: ${data.winner}!`]);
      mafiaPhase.textContent = `🏆 Игра окончена! Победили: ${data.winner}`;
      mafiaActionArea.innerHTML = '<p style="color:#f5c542;">Игра завершена. Нажмите "Выйти".</p>';
    });

    mafiaSocket.on('error', showMafiaError);

    document.getElementById('mafiaCreateBtn').addEventListener('click', () => {
      const name = mafiaPlayerName.value.trim() || 'Игрок';
      mafiaSocket.emit('createRoom', { playerName: name, gameType: 'mafia' });
    });

    document.getElementById('mafiaJoinBtn').addEventListener('click', () => {
      const name = mafiaPlayerName.value.trim() || 'Игрок';
      const code = mafiaRoomCode.value.trim().toUpperCase();
      if (!code) { showMafiaError('Введите код комнаты'); return; }
      mafiaSocket.emit('joinRoom', { roomCode: code, playerName: name });
    });

    document.getElementById('mafiaStartBtn').addEventListener('click', () => {
      if (mafiaCurrentRoom) mafiaSocket.emit('startGame', mafiaCurrentRoom);
    });

    document.getElementById('mafiaLeaveBtn').addEventListener('click', mafiaLeave);
    document.getElementById('mafiaLeaveGameBtn').addEventListener('click', mafiaLeave);

    // ============================================================
    // ШПИОН (ОТДЕЛЬНЫЙ SOCKET)
    // ============================================================
    const spySocket = io();

    const spyLobby = document.getElementById('spyLobby');
    const spyRoom = document.getElementById('spyRoom');
    const spyGame = document.getElementById('spyGame');
    const spyRoomCodeDisplay = document.getElementById('spyRoomCodeDisplay');
    const spyPlayersCount = document.getElementById('spyPlayersCount');
    const spyPlayerList = document.getElementById('spyPlayerList');
    const spyLog = document.getElementById('spyLog');
    const spyPhase = document.getElementById('spyPhase');
    const spyMyRole = document.getElementById('spyMyRole');
    const spyActionArea = document.getElementById('spyActionArea');
    const spyError = document.getElementById('spyError');

    const spyPlayerName = document.getElementById('spyPlayerName');
    const spyRoomCode = document.getElementById('spyRoomCode');

    let spyCurrentRoom = null;
    let spyIsHost = false;

    function showSpyError(msg) {
      spyError.textContent = msg;
      setTimeout(() => spyError.textContent = '', 5000);
    }

    function updateSpyPlayerList(players) {
      spyPlayerList.innerHTML = '';
      players.forEach(p => {
        const chip = document.createElement('span');
        chip.className = 'player-chip' + (p.isHost ? ' host' : '');
        chip.textContent = p.name + (p.isHost ? ' 👑' : '');
        spyPlayerList.appendChild(chip);
      });
      spyPlayersCount.textContent = `Игроков: ${players.length}`;
    }

    function updateSpyLog(entries) {
      spyLog.innerHTML = '';
      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.textContent = entry;
        spyLog.appendChild(div);
      });
      spyLog.scrollTop = spyLog.scrollHeight;
    }

    function renderSpyAction(data) {
      spyActionArea.innerHTML = '';
      const alive = data.alive || [];
      if (alive.length > 0) {
        const select = document.createElement('select');
        select.id = 'spyTarget';
        alive.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary btn-small';
        btn.textContent = '🕵️ Указать на шпиона';
        btn.addEventListener('click', () => {
          const target = select.value;
          if (target) {
            spySocket.emit('dayVote', { roomCode: spyCurrentRoom, targetPlayerName: target });
            spyActionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
          }
        });
        spyActionArea.appendChild(select);
        spyActionArea.appendChild(btn);
      }
    }

    function spyLeave() {
      spySocket.disconnect();
      spySocket.connect();
      spyLobby.classList.remove('hidden');
      spyRoom.classList.add('hidden');
      spyGame.classList.add('hidden');
      spyCurrentRoom = null;
    }

    spySocket.on('roomCreated', (data) => {
      spyCurrentRoom = data.roomCode;
      spyIsHost = true;
      spyLobby.classList.add('hidden');
      spyRoom.classList.remove('hidden');
      spyRoomCodeDisplay.textContent = data.roomCode;
    });

    spySocket.on('joinedRoom', (data) => {
      spyCurrentRoom = data.roomCode;
      spyIsHost = false;
      spyLobby.classList.add('hidden');
      spyRoom.classList.remove('hidden');
      spyRoomCodeDisplay.textContent = data.roomCode;
    });

    spySocket.on('playersUpdate', updateSpyPlayerList);

    spySocket.on('gameStarted', (data) => {
      spyRoom.classList.add('hidden');
      spyGame.classList.remove('hidden');
      spyPhase.textContent = '🕵️ Обсуждение';
      const role = data.roles ? data.roles[spySocket.id] : '???';
      spyMyRole.textContent = role + (data.location ? ` | Локация: ${data.location}` : '');
      updateSpyLog(data.log || []);
      renderSpyAction(data);
    });

    spySocket.on('dayResult', (data) => {
      updateSpyLog([`🕵️ Игрок ${data.eliminated} указан как шпион!`]);
    });

    spySocket.on('gameEnded', (data) => {
      updateSpyLog([`🏆 Победили: ${data.winner}!`]);
      spyPhase.textContent = `🏆 Игра окончена! Победили: ${data.winner}`;
      spyActionArea.innerHTML = '<p style="color:#f5c542;">Игра завершена. Нажмите "Выйти".</p>';
    });

    spySocket.on('error', showSpyError);

    document.getElementById('spyCreateBtn').addEventListener('click', () => {
      const name = spyPlayerName.value.trim() || 'Игрок';
      spySocket.emit('createRoom', { playerName: name, gameType: 'spy' });
    });

    document.getElementById('spyJoinBtn').addEventListener('click', () => {
      const name = spyPlayerName.value.trim() || 'Игрок';
      const code = spyRoomCode.value.trim().toUpperCase();
      if (!code) { showSpyError('Введите код комнаты'); return; }
      spySocket.emit('joinRoom', { roomCode: code, playerName: name });
    });

    document.getElementById('spyStartBtn').addEventListener('click', () => {
      if (spyCurrentRoom) spySocket.emit('startGame', spyCurrentRoom);
    });

    document.getElementById('spyLeaveBtn').addEventListener('click', spyLeave);
    document.getElementById('spyLeaveGameBtn').addEventListener('click', spyLeave);

    // ============================================================
    // ЗАПУСК БУНКЕРА ПРИ ЗАГРУЗКЕ
    // ============================================================
    fetchBunkerCards();
  })();
</script>
</body>
</html>
