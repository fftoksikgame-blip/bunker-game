<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Мафия & Шпион — Онлайн</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e14;
      background-image: radial-gradient(circle at 20% 30%, #1a2a3a, #05080a);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      color: #e8e8e8;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app {
      max-width: 900px;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #1a2a3a;
      padding-bottom: 10px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f5c542, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .header .sub { color: #8899aa; font-size: 0.9rem; }

    .card {
      background: #101820;
      border: 1px solid #1a2a3a;
      border-radius: 16px;
      padding: 20px;
      margin: 12px 0;
    }
    .card h2 { color: #f5c542; font-weight: 400; margin-bottom: 10px; font-size: 1.2rem; }
    .input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .input-group input, .input-group select {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      color: #e8e8e8;
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 1rem;
      flex: 1;
      min-width: 120px;
      outline: none;
    }
    .input-group input:focus { border-color: #f5c542; }
    .btn {
      background: #f5c542;
      border: none;
      color: #0a0e14;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.15s;
      font-size: 1rem;
    }
    .btn:active { transform: scale(0.94); }
    .btn-secondary { background: #1a2a3a; color: #c0d0e0; }
    .btn-secondary:hover { background: #2a3a4a; }
    .btn-danger { background: #6a1a1a; color: #ff8888; }
    .btn-success { background: #1a5a2a; color: #7aff7a; }
    .btn-outline { background: transparent; border: 1px solid #f5c542; color: #f5c542; }
    .btn-small { font-size: 0.8rem; padding: 6px 16px; }
    .hidden { display: none !important; }

    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }
    .player-chip {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.9rem;
      color: #e8e8e8;
    }
    .player-chip.host { border-color: #f5c542; background: #1a2a2a; }
    .player-chip.dead { opacity: 0.3; text-decoration: line-through; }

    .log {
      background: #0a141c;
      border-radius: 12px;
      padding: 12px 16px;
      max-height: 200px;
      overflow-y: auto;
      margin: 10px 0;
      font-size: 0.9rem;
      color: #aab;
      border: 1px solid #1a2a3a;
    }
    .log .entry { padding: 4px 0; border-bottom: 1px solid #0a141c; }

    .vote-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }
    .vote-area select {
      background: #0a141c;
      border: 1px solid #1a2a3a;
      color: #e8e8e8;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 1rem;
      flex: 1;
      min-width: 120px;
      outline: none;
    }
    .vote-area select:focus { border-color: #f5c542; }

    .role-reveal {
      background: #1a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      margin: 10px 0;
      text-align: center;
      font-size: 1.2rem;
    }
    .role-reveal .role { color: #f5c542; font-weight: 700; }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .input-group input, .input-group select { font-size: 0.9rem; }
      .btn { font-size: 0.9rem; padding: 8px 18px; }
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- ХЕДЕР -->
  <div class="header">
    <h1>🎭 Мафия & Шпион</h1>
    <div class="sub">Онлайн-игра с друзьями</div>
  </div>

  <!-- ЭКРАН ВХОДА -->
  <div id="lobbyScreen" class="card">
    <h2>🏠 Вход в игру</h2>
    <div class="input-group" style="margin-bottom:10px;">
      <input type="text" id="playerNameInput" placeholder="Ваш ник" value="Игрок">
      <select id="gameTypeSelect">
        <option value="mafia">🔪 Мафия</option>
        <option value="spy">🕵️ Шпион</option>
      </select>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" id="createRoomBtn">➕ Создать комнату</button>
      <div style="display:flex; gap:6px; flex:1; min-width:200px;">
        <input type="text" id="roomCodeInput" placeholder="Код комнаты" style="flex:1; background:#0a141c; border:1px solid #1a2a3a; color:#e8e8e8; padding:10px 16px; border-radius:30px; font-size:1rem; outline:none;">
        <button class="btn btn-secondary" id="joinRoomBtn">🔗 Войти</button>
      </div>
    </div>
    <div id="errorMessage" style="color:#ff6666; margin-top:8px;"></div>
  </div>

  <!-- ЭКРАН КОМНАТЫ -->
  <div id="roomScreen" class="card hidden">
    <h2>📦 Комната: <span id="roomCodeDisplay">---</span></h2>
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;">
      <span id="gameTypeDisplay" style="color:#aab;">Игра: Мафия</span>
      <span id="playersCountDisplay" style="color:#aab;">Игроков: 0</span>
    </div>
    <div class="player-list" id="playerList"></div>
    <button class="btn btn-success" id="startGameBtn">🚀 Начать игру</button>
    <button class="btn btn-secondary" id="leaveRoomBtn">🚪 Выйти</button>
  </div>

  <!-- ЭКРАН ИГРЫ -->
  <div id="gameScreen" class="card hidden">
    <h2>🎮 Игра идёт</h2>
    <div id="phaseDisplay" style="color:#f5c542; font-size:1.2rem; margin-bottom:8px;">🌙 Ночь</div>
    <div class="log" id="gameLog"></div>
    <div id="roleDisplay" class="role-reveal">
      <span class="role" id="myRoleDisplay">???</span>
    </div>
    <div id="actionArea"></div>
    <button class="btn btn-secondary" id="leaveGameBtn">🚪 Выйти из игры</button>
  </div>
</div>

<script>
  const socket = io();

  // --- DOM ---
  const lobbyScreen = document.getElementById('lobbyScreen');
  const roomScreen = document.getElementById('roomScreen');
  const gameScreen = document.getElementById('gameScreen');
  const roomCodeDisplay = document.getElementById('roomCodeDisplay');
  const gameTypeDisplay = document.getElementById('gameTypeDisplay');
  const playersCountDisplay = document.getElementById('playersCountDisplay');
  const playerList = document.getElementById('playerList');
  const gameLog = document.getElementById('gameLog');
  const phaseDisplay = document.getElementById('phaseDisplay');
  const myRoleDisplay = document.getElementById('myRoleDisplay');
  const actionArea = document.getElementById('actionArea');
  const errorMessage = document.getElementById('errorMessage');

  const playerNameInput = document.getElementById('playerNameInput');
  const gameTypeSelect = document.getElementById('gameTypeSelect');
  const roomCodeInput = document.getElementById('roomCodeInput');

  let currentRoom = null;
  let isHost = false;
  let myPlayerName = '';
  let gameState = null;

  // --- ОБРАБОТЧИКИ КНОПОК ---
  document.getElementById('createRoomBtn').addEventListener('click', () => {
    const name = playerNameInput.value.trim() || 'Игрок';
    const gameType = gameTypeSelect.value;
    myPlayerName = name;
    socket.emit('createRoom', { playerName: name, gameType });
  });

  document.getElementById('joinRoomBtn').addEventListener('click', () => {
    const name = playerNameInput.value.trim() || 'Игрок';
    const code = roomCodeInput.value.trim().toUpperCase();
    if (!code) { showError('Введите код комнаты'); return; }
    myPlayerName = name;
    socket.emit('joinRoom', { roomCode: code, playerName: name });
  });

  document.getElementById('startGameBtn').addEventListener('click', () => {
    if (currentRoom) {
      socket.emit('startGame', currentRoom);
    }
  });

  document.getElementById('leaveRoomBtn').addEventListener('click', () => {
    leaveRoom();
  });

  document.getElementById('leaveGameBtn').addEventListener('click', () => {
    leaveRoom();
  });

  function leaveRoom() {
    socket.disconnect();
    socket.connect();
    resetUI();
    location.reload();
  }

  function showError(msg) {
    errorMessage.textContent = msg;
    setTimeout(() => errorMessage.textContent = '', 5000);
  }

  function resetUI() {
    lobbyScreen.classList.remove('hidden');
    roomScreen.classList.add('hidden');
    gameScreen.classList.add('hidden');
    currentRoom = null;
    isHost = false;
    gameState = null;
  }

  // --- SOCKET СОБЫТИЯ ---
  socket.on('roomCreated', (data) => {
    currentRoom = data.roomCode;
    isHost = true;
    lobbyScreen.classList.add('hidden');
    roomScreen.classList.remove('hidden');
    roomCodeDisplay.textContent = data.roomCode;
    gameTypeDisplay.textContent = `Игра: ${gameTypeSelect.options[gameTypeSelect.selectedIndex].text}`;
  });

  socket.on('joinedRoom', (data) => {
    currentRoom = data.roomCode;
    isHost = false;
    lobbyScreen.classList.add('hidden');
    roomScreen.classList.remove('hidden');
    roomCodeDisplay.textContent = data.roomCode;
    gameTypeDisplay.textContent = `Игра: ${data.gameType === 'mafia' ? '🔪 Мафия' : '🕵️ Шпион'}`;
  });

  socket.on('playersUpdate', (players) => {
    updatePlayerList(players);
    playersCountDisplay.textContent = `Игроков: ${players.length}`;
  });

  socket.on('gameStarted', (data) => {
    roomScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    gameState = data;
    phaseDisplay.textContent = data.phase === 'night' ? '🌙 Ночь' : '☀️ День';
    // Показываем роль игрока
    const role = data.roles ? data.roles[socket.id] : '???';
    myRoleDisplay.textContent = role || '???';
    if (data.gameType === 'spy' && data.location) {
      myRoleDisplay.textContent += ` | Локация: ${data.location}`;
    }
    updateGameLog(data.log || []);
    renderActionArea(data);
  });

  socket.on('phaseUpdate', (data) => {
    phaseDisplay.textContent = data.phase === 'night' ? '🌙 Ночь' : '☀️ День';
    if (data.log) updateGameLog(data.log);
  });

  socket.on('nightVoteUpdate', (data) => {
    // Обновление голосов мафии
  });

  socket.on('nightResult', (data) => {
    updateGameLog([`🌙 Мафия выбрала ${data.kill}`]);
  });

  socket.on('dayVoteUpdate', (data) => {
    // Обновление голосов
  });

  socket.on('dayResult', (data) => {
    updateGameLog([`☀️ Игрок ${data.eliminated} выгнан!`]);
    if (data.alive) {
      // Обновляем список живых
    }
  });

  socket.on('gameEnded', (data) => {
    updateGameLog([`🏆 Победили: ${data.winner}!`]);
    phaseDisplay.textContent = `🏆 Игра окончена! Победили: ${data.winner}`;
    actionArea.innerHTML = '<p style="color:#f5c542;">Игра завершена. Нажмите "Выйти" чтобы начать новую.</p>';
  });

  socket.on('error', (msg) => {
    showError(msg);
  });

  socket.on('connect_error', () => {
    showError('Ошибка подключения к серверу');
  });

  // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
  function updatePlayerList(players) {
    playerList.innerHTML = '';
    players.forEach(p => {
      const chip = document.createElement('span');
      chip.className = 'player-chip' + (p.isHost ? ' host' : '');
      chip.textContent = p.name + (p.isHost ? ' 👑' : '');
      playerList.appendChild(chip);
    });
  }

  function updateGameLog(entries) {
    gameLog.innerHTML = '';
    entries.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.textContent = entry;
      gameLog.appendChild(div);
    });
    gameLog.scrollTop = gameLog.scrollHeight;
  }

  function renderActionArea(data) {
    actionArea.innerHTML = '';
    if (data.gameType === 'mafia') {
      if (data.phase === 'night') {
        const role = data.roles ? data.roles[socket.id] : '';
        if (role === 'Мафия') {
          const alivePlayers = data.alive || [];
          if (alivePlayers.length > 0) {
            const select = document.createElement('select');
            select.id = 'mafiaTarget';
            alivePlayers.forEach(name => {
              const opt = document.createElement('option');
              opt.value = name;
              opt.textContent = name;
              select.appendChild(opt);
            });
            const btn = document.createElement('button');
            btn.className = 'btn btn-danger btn-small';
            btn.textContent = '🔪 Убить';
            btn.addEventListener('click', () => {
              const target = select.value;
              if (target) {
                socket.emit('nightVote', { roomCode: currentRoom, targetPlayerName: target });
                actionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
              }
            });
            actionArea.appendChild(select);
            actionArea.appendChild(btn);
          }
        } else {
          actionArea.innerHTML = '<p style="color:#aab;">🌙 Город засыпает... Ожидайте утра.</p>';
        }
      } else if (data.phase === 'day') {
        const alivePlayers = data.alive || [];
        if (alivePlayers.length > 0) {
          const select = document.createElement('select');
          select.id = 'dayTarget';
          alivePlayers.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
          });
          const btn = document.createElement('button');
          btn.className = 'btn btn-secondary btn-small';
          btn.textContent = '🗳️ Голосовать';
          btn.addEventListener('click', () => {
            const target = select.value;
            if (target) {
              socket.emit('dayVote', { roomCode: currentRoom, targetPlayerName: target });
              actionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
            }
          });
          actionArea.appendChild(select);
          actionArea.appendChild(btn);
        }
      }
    } else if (data.gameType === 'spy') {
      const alivePlayers = data.alive || [];
      if (alivePlayers.length > 0) {
        const select = document.createElement('select');
        select.id = 'spyTarget';
        alivePlayers.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary btn-small';
        btn.textContent = '🕵️ Указать на шпиона';
        btn.addEventListener('click', () => {
          const target = select.value;
          if (target) {
            socket.emit('dayVote', { roomCode: currentRoom, targetPlayerName: target });
            actionArea.innerHTML = '<p style="color:#7aff7a;">✅ Голос учтён!</p>';
          }
        });
        actionArea.appendChild(select);
        actionArea.appendChild(btn);
      }
    }
  }
</script>
</body>
</html>
